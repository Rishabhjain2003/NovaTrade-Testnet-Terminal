services:
  # Backend API Gateway
  - type: web
    name: novatrade-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: cd apps/backend && npm install && npm run build
    startCommand: cd apps/backend && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PORT
        value: 10000
    healthCheckPath: /health

  # Execution Service
  - type: worker
    name: novatrade-execution
    env: node
    region: oregon
    plan: starter
    buildCommand: cd apps/execution-service && npm install && npm run build
    startCommand: cd apps/execution-service && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENCRYPTION_KEY
        fromService:
          type: web
          name: novatrade-backend
          property: ENCRYPTION_KEY
      - key: BINANCE_TESTNET_URL
        value: https://testnet.binance.vision

  # Event Service (WebSocket)
  - type: web
    name: novatrade-events
    env: node
    region: oregon
    plan: starter
    buildCommand: cd apps/event-service && npm install && npm run build
    startCommand: cd apps/event-service && npm start
    envVars:
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: novatrade-backend
          property: JWT_SECRET
      - key: WS_PORT
        value: 10000
      - key: BINANCE_WS_URL
        value: wss://stream.testnet.binance.vision

databases:
  - name: novatrade-db
    databaseName: novatrade
    user: novatrade
    plan: starter
    region: oregon

  - name: novatrade-redis
    plan: starter
    region: oregon
