services:
  - type: worker
    name: novatrade-execution
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: BINANCE_TESTNET_URL
        value: https://testnet.binance.vision
